name: Build

on:
  push:
    branches: [ "master" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      # Debug
      - name: Publish (Debug)
        run: >
          dotnet publish ImageToFontConverter.csproj
          -c Debug
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/debug

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageToFontConverter-Debug
          path: publish/debug/ImageToFontConverter.exe
          if-no-files-found: error

      # Release
      - name: Publish (Release)
        run: >
          dotnet publish ImageToFontConverter.csproj
          -c Release
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o publish/release

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageToFontConverter-Release
          path: publish/release/ImageToFontConverter.exe
          if-no-files-found: error